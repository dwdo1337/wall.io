<svg width="1100" height="420" viewBox="0 0 1100 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#39ff14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1100" height="420" fill="#060907"/>

  <!-- row 1: terminal page -->
  <g transform="translate(40,40)">
    <rect width="230" height="90" rx="8" fill="#0d1710" stroke="#245c34" stroke-width="1.2"/>
    <text x="115" y="38" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="15" fill="#eafff0" font-weight="700">trading terminal</text>
    <text x="115" y="60" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="12" fill="#7fdba0">Trojan · GMGN · Axiom …</text>
    <text x="115" y="78" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="12" fill="#7fdba0">you hover a wallet</text>
  </g>

  <line x1="270" y1="85" x2="330" y2="85" stroke="#39ff14" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g transform="translate(330,40)">
    <rect width="240" height="90" rx="8" fill="#0d1710" stroke="#245c34" stroke-width="1.2"/>
    <text x="120" y="32" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="15" fill="#eafff0" font-weight="700">content.js</text>
    <text x="120" y="54" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="12" fill="#7fdba0">resolves the wallet address</text>
    <text x="120" y="72" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="12" fill="#7fdba0">(DOM walk, or inject.js sniff)</text>
  </g>

  <line x1="570" y1="85" x2="630" y2="85" stroke="#39ff14" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g transform="translate(630,40)">
    <rect width="230" height="90" rx="8" fill="#0d1710" stroke="#245c34" stroke-width="1.2"/>
    <text x="115" y="32" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="15" fill="#eafff0" font-weight="700">background.js</text>
    <text x="115" y="54" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="12" fill="#7fdba0">90s session cache</text>
    <text x="115" y="72" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="12" fill="#7fdba0">then calls your backend</text>
  </g>

  <!-- down to backend -->
  <line x1="745" y1="130" x2="745" y2="180" stroke="#39ff14" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g transform="translate(590,180)">
    <rect width="310" height="90" rx="8" fill="#071a0d" stroke="#39ff14" stroke-width="1.5"/>
    <text x="155" y="32" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="15" fill="#39ff14" font-weight="700">backend (localhost:3001)</text>
    <text x="155" y="54" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="12" fill="#7fdba0">FIFO buy/sell matching</text>
    <text x="155" y="72" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="12" fill="#7fdba0">avg + median hold time</text>
  </g>

  <!-- down to data sources -->
  <line x1="700" y1="270" x2="620" y2="320" stroke="#39ff14" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="790" y1="270" x2="870" y2="320" stroke="#39ff14" stroke-width="1.2" marker-end="url(#arrow)"/>

  <g transform="translate(480,320)">
    <rect width="200" height="70" rx="8" fill="#0d1710" stroke="#245c34" stroke-width="1.2"/>
    <text x="100" y="30" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="14" fill="#eafff0" font-weight="700">GMGN.ai</text>
    <text x="100" y="50" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="11" fill="#7fdba0">primary · free · no key</text>
  </g>

  <g transform="translate(760,320)">
    <rect width="200" height="70" rx="8" fill="#0d1710" stroke="#245c34" stroke-width="1.2"/>
    <text x="100" y="30" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="14" fill="#eafff0" font-weight="700">Helius API</text>
    <text x="100" y="50" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="11" fill="#7fdba0">fallback · optional key</text>
  </g>

  <!-- back up to badge -->
  <path d="M 590 225 C 400 225, 250 225, 200 160" fill="none" stroke="#3f8cff" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="330" y="205" font-family="Menlo, Consolas, monospace" font-size="12" fill="#3f8cff">result flows back →</text>

  <g transform="translate(40,140)">
    <rect width="230" height="80" rx="8" fill="#070c08" stroke="#39ff14" stroke-width="1.5"/>
    <text x="115" y="30" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="14" fill="#39ff14" font-weight="700">badge renders</text>
    <text x="115" y="50" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="12" fill="#8fb59c">2d 4h · med 1d 8h</text>
    <text x="115" y="66" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="11" fill="#3f5a47">no reload, right where you're looking</text>
  </g>

  <text x="40" y="410" font-family="Menlo, Consolas, monospace" font-size="12" fill="#3f5a47">wallet addresses never leave your machine unless you point the backend at a remote server</text>
</svg>
