<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body{margin:0;background:#0a0c0b;font-family:'Roboto Mono','SF Mono',Consolas,Menlo,monospace;padding:32px;}
  .brand{color:#e8ede8;font-size:20px;font-weight:700;margin-bottom:4px;}
  .sub{color:#6a7a6a;font-size:12px;margin-bottom:20px;}
  .badge{position:relative;display:inline-block;min-width:220px;padding:16px 18px;background:#0a0a0a;border:1px solid rgba(0,255,136,0.3);border-left:3px solid #00ff88;border-radius:6px;box-shadow:0 4px 20px rgba(0,0,0,0.85),0 0 12px rgba(0,255,136,0.15);}
  .hdr{display:flex;justify-content:space-between;align-items:center;}
  .lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1px;font-weight:600;}
  .per{font-size:10px;color:#4a9eff;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;}
  .val{font-size:26px;font-weight:700;text-align:center;margin:8px 0 2px;color:#00ff88;text-shadow:0 0 8px rgba(0,255,136,0.3);}
  .div{height:2px;width:80%;margin:4px auto 6px;background:#00ff88;opacity:0.5;}
  .med{font-size:12px;color:#b0b0b0;text-align:center;}
  .xbtn{margin-top:10px;padding:6px 8px;color:#1d9bf0;background:rgba(29,155,240,0.08);border:1px solid rgba(29,155,240,0.25);border-radius:4px;font-size:11px;font-weight:600;text-align:center;}
</style></head>
<body>
  <div class="brand">wall.io</div>
  <div class="sub">badge with median populated — 30d window</div>
  <div class="badge">
    <div class="hdr"><span class="lbl">⏱ HOLDING PERIOD</span><span class="per">30D</span></div>
    <div class="val">22h 40m</div>
    <div class="div"></div>
    <div class="med">med <b style="color:#c8c8c8;">18h 5m</b></div>
    <div class="xbtn">SEARCH ON X ↗</div>
  </div>
</body></html>
