<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body{margin:0;background:#0a0c0b;font-family:'Roboto Mono','SF Mono',Consolas,Menlo,monospace;padding:32px;}
  .h{color:#e8ede8;font-size:20px;font-weight:700;margin-bottom:4px;}
  .sub{color:#6a7a6a;font-size:12px;margin-bottom:24px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:560px;}
  .cell{padding:12px;background:#0a0a0a;border:1px solid rgba(0,255,136,0.2);border-radius:6px;color:#00ff88;font-size:12px;text-align:center;}
</style></head>
<body>
  <div class="h">works everywhere you already trade</div>
  <div class="sub">12 terminals, one hover</div>
  <div class="grid">
    <div class="cell">Trojan</div>
    <div class="cell">GMGN</div>
    <div class="cell">Axiom</div>
    <div class="cell">Padre</div>
    <div class="cell">DexScreener</div>
    <div class="cell">Pump.fun</div>
    <div class="cell">Raydium</div>
    <div class="cell">Jupiter</div>
    <div class="cell">Meteora</div>
    <div class="cell">Birdeye</div>
    <div class="cell">Solscan</div>
    <div class="cell">Solana Explorer</div>
  </div>
</body></html>
