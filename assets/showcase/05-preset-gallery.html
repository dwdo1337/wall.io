<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body{margin:0;background:#0a0c0b;font-family:'Roboto Mono','SF Mono',Consolas,Menlo,monospace;padding:32px;}
  .h{color:#e8ede8;font-size:20px;font-weight:700;margin-bottom:20px;}
  .row{display:flex;gap:16px;flex-wrap:wrap;}
  .p{min-width:150px;padding:14px 16px;border-radius:6px;}
  .l{font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .v{font-size:20px;font-weight:700;text-align:center;}
</style></head>
<body>
  <div class="h">5 built-in presets — swap instantly, no reload</div>
  <div class="row">
    <div class="p" style="background:#0a0a0a;border:1px solid rgba(0,255,136,0.3);border-left:3px solid #00ff88;">
      <div class="l" style="color:#888;">Default</div><div class="v" style="color:#00ff88;">1h 8m</div>
    </div>
    <div class="p" style="background:#050505;border:1px solid rgba(0,255,136,0.5);border-left:3px solid #00ff88;">
      <div class="l" style="color:#4a6b4a;">Neon</div><div class="v" style="color:#39ff14;">1h 8m</div>
    </div>
    <div class="p" style="background:rgba(10,12,11,0.9);border:1px solid #333;border-left:1px solid #333;">
      <div class="l" style="color:#555;">Stealth</div><div class="v" style="color:#66bb6a;">1h 8m</div>
    </div>
    <div class="p" style="background:#120505;border:1px solid rgba(255,51,51,0.35);border-left:2px solid #ff3333;">
      <div class="l" style="color:#6b4a4a;">Crimson</div><div class="v" style="color:#ff5555;">1h 8m</div>
    </div>
    <div class="p" style="background:#050a12;border:1px solid rgba(0,212,255,0.3);border-left:2px solid #00d4ff;">
      <div class="l" style="color:#4a6a7a;">Ocean</div><div class="v" style="color:#00e5ff;">1h 8m</div>
    </div>
  </div>
</body></html>
