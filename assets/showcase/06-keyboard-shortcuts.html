<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  body{margin:0;background:#0a0c0b;font-family:'Roboto Mono','SF Mono',Consolas,Menlo,monospace;padding:32px;}
  .h{color:#e8ede8;font-size:20px;font-weight:700;margin-bottom:20px;}
  .row{display:flex;gap:8px;}
  .key{padding:8px 12px;background:#0a0a0a;border:1px solid rgba(0,255,136,0.3);border-radius:4px;color:#00ff88;font-size:13px;font-weight:700;}
  .list{margin-top:20px;color:#9aa39a;font-size:12px;line-height:2;}
  .list b{color:#e8ede8;}
</style></head>
<body>
  <div class="h">no menu, just keys</div>
  <div class="row">
    <div class="key">1</div><div class="key">3</div><div class="key">7</div><div class="key">0</div><div class="key">Esc</div>
  </div>
  <div class="list">
    <b>1</b> — 1 day window &nbsp;·&nbsp; <b>3</b> — 3 day window &nbsp;·&nbsp; <b>7</b> — 7 day window &nbsp;·&nbsp; <b>0</b> — 30 day window &nbsp;·&nbsp; <b>Esc</b> — close badge
  </div>
</body></html>
